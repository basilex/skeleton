basePath: /
definitions:
  github_com_basilex_skeleton_internal_identity_application_query.UserDTO:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      roles:
        items:
          type: string
        type: array
      updated_at:
        type: string
    type: object
  github_com_basilex_skeleton_pkg_apierror.APIError:
    properties:
      detail:
        type: string
      instance:
        type: string
      request_id:
        type: string
      status:
        type: integer
      title:
        type: string
      type:
        type: string
    type: object
  http.CreateScheduleRequest:
    properties:
      cron:
        type: string
      name:
        type: string
      payload:
        additionalProperties: true
        type: object
      task_type:
        type: string
      timezone:
        type: string
    type: object
  http.CreateScheduleResponse:
    properties:
      schedule_id:
        type: string
    type: object
  http.CreateTaskRequest:
    properties:
      max_attempts:
        type: integer
      payload:
        additionalProperties: true
        type: object
      priority:
        type: string
      scheduled_at:
        type: string
      task_type:
        type: string
    type: object
  http.CreateTaskResponse:
    properties:
      task_id:
        type: string
    type: object
  http.DeadLetterResponse:
    properties:
      action:
        type: string
      created_at:
        type: string
      failed_at:
        type: string
      id:
        type: string
      original_task:
        $ref: '#/definitions/http.TaskResponse'
      reason:
        type: string
      reviewed:
        type: boolean
      reviewed_at:
        type: string
      reviewed_by:
        type: string
    type: object
  http.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  http.ScheduleResponse:
    properties:
      created_at:
        type: string
      cron:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      last_run_at:
        type: string
      name:
        type: string
      next_run_at:
        type: string
      payload:
        additionalProperties: true
        type: object
      task_type:
        type: string
      timezone:
        type: string
      updated_at:
        type: string
    type: object
  http.TaskErrorResponse:
    properties:
      code:
        type: string
      details:
        additionalProperties:
          type: string
        type: object
      message:
        type: string
    type: object
  http.TaskResponse:
    properties:
      attempts:
        type: integer
      completed_at:
        type: string
      created_at:
        type: string
      error:
        $ref: '#/definitions/http.TaskErrorResponse'
      id:
        type: string
      max_attempts:
        type: integer
      payload:
        additionalProperties: true
        type: object
      priority:
        type: string
      result:
        $ref: '#/definitions/http.TaskResultResponse'
      scheduled_at:
        type: string
      started_at:
        type: string
      status:
        type: string
      task_type:
        type: string
      updated_at:
        type: string
    type: object
  http.TaskResultResponse:
    properties:
      data:
        additionalProperties: true
        type: object
      duration_ms:
        type: integer
      output_path:
        type: string
    type: object
  internal_identity_ports_http.AssignRoleRequest:
    properties:
      role_id:
        example: 019d65d6-de90-7200-b1cf-4f8745597e0a
        type: string
    required:
    - role_id
    type: object
  internal_identity_ports_http.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: StrongPass123!
        type: string
    required:
    - email
    - password
    type: object
  internal_identity_ports_http.RefreshRequest:
    properties:
      refresh_token:
        example: eyJhbGciOiJSUzI1NiIs...
        type: string
    required:
    - refresh_token
    type: object
  internal_identity_ports_http.RegisterRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: StrongPass123!
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  internal_identity_ports_http.TokenResponse:
    properties:
      access_token:
        example: eyJhbGciOiJSUzI1NiIs...
        type: string
      refresh_token:
        example: 019d65d6-de90-7200-b1cf-4f8745597e0a
        type: string
    type: object
  internal_notifications_ports_http.ChannelPreferenceRequest:
    properties:
      enabled:
        type: boolean
      frequency:
        example: immediate
        type: string
      quiet_hours:
        $ref: '#/definitions/internal_notifications_ports_http.QuietHoursRequest'
    type: object
  internal_notifications_ports_http.ChannelPreferenceResponse:
    properties:
      enabled:
        type: boolean
      frequency:
        type: string
      quiet_hours:
        $ref: '#/definitions/internal_notifications_ports_http.QuietHoursResponse'
    type: object
  internal_notifications_ports_http.CreateNotificationRequest:
    properties:
      channel:
        example: email
        type: string
      content:
        example: Welcome to our platform!
        type: string
      device_token:
        example: abc123def456
        type: string
      email:
        example: user@example.com
        type: string
      html_content:
        example: <h1>Welcome</h1>
        type: string
      max_attempts:
        example: 5
        type: integer
      metadata:
        additionalProperties:
          type: string
        example:
          '{"key"': '"value"}'
        type: object
      phone:
        example: "+1234567890"
        type: string
      priority:
        example: normal
        type: string
      scheduled_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      subject:
        example: Welcome
        type: string
      user_id:
        example: 019d65d6-de90-7200-b1cf-4f8745597e0a
        type: string
    required:
    - channel
    - content
    - subject
    type: object
  internal_notifications_ports_http.CreateTemplateRequest:
    properties:
      body:
        example: Hello {{.Name}}, welcome!
        type: string
      channel:
        example: email
        type: string
      html_body:
        example: <h1>Hello {{.Name}}</h1>
        type: string
      name:
        example: welcome_email
        type: string
      subject:
        example: Welcome to {{.AppName}}
        type: string
      variables:
        example:
        - Name
        - AppName
        items:
          type: string
        type: array
    required:
    - body
    - channel
    - name
    - subject
    type: object
  internal_notifications_ports_http.NotificationPreferencesRequest:
    properties:
      channels:
        additionalProperties:
          $ref: '#/definitions/internal_notifications_ports_http.ChannelPreferenceRequest'
        type: object
    required:
    - channels
    type: object
  internal_notifications_ports_http.NotificationPreferencesResponse:
    properties:
      channels:
        additionalProperties:
          $ref: '#/definitions/internal_notifications_ports_http.ChannelPreferenceResponse'
        type: object
      created_at:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  internal_notifications_ports_http.NotificationResponse:
    properties:
      attempts:
        type: integer
      channel:
        type: string
      content:
        type: string
      created_at:
        type: string
      delivered_at:
        type: string
      device_token:
        type: string
      email:
        type: string
      failed_at:
        type: string
      html_content:
        type: string
      id:
        type: string
      max_attempts:
        type: integer
      metadata:
        additionalProperties:
          type: string
        type: object
      phone:
        type: string
      priority:
        type: string
      scheduled_at:
        type: string
      sent_at:
        type: string
      status:
        type: string
      subject:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  internal_notifications_ports_http.QuietHoursRequest:
    properties:
      end_hour:
        example: 8
        type: integer
      start_hour:
        example: 22
        type: integer
      timezone:
        example: UTC
        type: string
    type: object
  internal_notifications_ports_http.QuietHoursResponse:
    properties:
      end_hour:
        type: integer
      start_hour:
        type: integer
      timezone:
        type: string
    type: object
  internal_notifications_ports_http.TemplateResponse:
    properties:
      body:
        type: string
      channel:
        type: string
      created_at:
        type: string
      html_body:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      subject:
        type: string
      updated_at:
        type: string
      variables:
        items:
          type: string
        type: array
    type: object
  internal_notifications_ports_http.UpdateTemplateRequest:
    properties:
      body:
        example: Hello {{.Name}}, welcome!
        type: string
      html_body:
        example: <h1>Hello {{.Name}}</h1>
        type: string
      subject:
        example: Welcome to {{.AppName}}
        type: string
      variables:
        example:
        - Name
        - AppName
        items:
          type: string
        type: array
    required:
    - body
    - subject
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: Go DDD Hexagonal architecture skeleton project API
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Skeleton API
  version: "1.0"
paths:
  /api/v1/audit/records:
    get:
      description: Returns paginated list of audit records with optional filters
      parameters:
      - description: Filter by actor ID
        in: query
        name: actor_id
        type: string
      - description: Filter by resource (user, role, auth)
        in: query
        name: resource
        type: string
      - description: Filter by action (create, read, update, delete, login, logout,
          etc.)
        in: query
        name: action
        type: string
      - description: Filter from date (RFC3339 format)
        in: query
        name: date_from
        type: string
      - description: Filter to date (RFC3339 format)
        in: query
        name: date_to
        type: string
      - description: Pagination cursor (UUID v7)
        in: query
        name: cursor
        type: string
      - description: Items per page (default 20, max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Paginated audit records
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
      security:
      - BearerAuth: []
      summary: List audit records
      tags:
      - audit
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates user and returns access + refresh tokens
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_identity_ports_http.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Tokens
          schema:
            $ref: '#/definitions/internal_identity_ports_http.TokenResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
      summary: Login user
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      description: Destroys current user session and logs logout event
      produces:
      - application/json
      responses:
        "200":
          description: Logout successful
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
      security:
      - SessionAuth: []
      summary: Logout user
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Issues new access token using refresh token
      parameters:
      - description: Refresh request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_identity_ports_http.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: New tokens
          schema:
            $ref: '#/definitions/internal_identity_ports_http.TokenResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "401":
          description: Invalid refresh token
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
      summary: Refresh access token
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account with email and password
      parameters:
      - description: Registration request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_identity_ports_http.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
      summary: Register a new user
      tags:
      - auth
  /api/v1/notifications:
    get:
      description: List notifications with optional filters
      parameters:
      - description: Filter by user ID
        in: query
        name: user_id
        type: string
      - description: Filter by status (pending, queued, sending, sent, delivered,
          failed)
        in: query
        name: status
        type: string
      - description: Filter by channel (email, sms, push, in_app)
        in: query
        name: channel
        type: string
      - description: Items per page (default 20)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Notifications list
          schema:
            items:
              $ref: '#/definitions/internal_notifications_ports_http.NotificationResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
      security:
      - BearerAuth: []
      summary: List notifications
      tags:
      - notifications
    post:
      consumes:
      - application/json
      description: Create a new notification manually (admin only)
      parameters:
      - description: Notification data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_notifications_ports_http.CreateNotificationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Notification created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
      security:
      - BearerAuth: []
      summary: Create a notification
      tags:
      - notifications
  /api/v1/notifications/{id}:
    get:
      description: Get notification details by ID
      parameters:
      - description: Notification ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Notification details
          schema:
            $ref: '#/definitions/internal_notifications_ports_http.NotificationResponse'
        "400":
          description: Invalid ID
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
      security:
      - BearerAuth: []
      summary: Get notification by ID
      tags:
      - notifications
  /api/v1/notifications/preferences:
    get:
      description: Get current user's notification preferences
      produces:
      - application/json
      responses:
        "200":
          description: User preferences
          schema:
            $ref: '#/definitions/internal_notifications_ports_http.NotificationPreferencesResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
      security:
      - BearerAuth: []
      summary: Get user notification preferences
      tags:
      - notifications
    patch:
      consumes:
      - application/json
      description: Update current user's notification preferences
      parameters:
      - description: Preferences data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_notifications_ports_http.NotificationPreferencesRequest'
      responses:
        "204":
          description: Preferences updated
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
      security:
      - BearerAuth: []
      summary: Update user notification preferences
      tags:
      - notifications
  /api/v1/notifications/templates:
    get:
      description: List all notification templates optionally filtered by channel
        (admin only)
      parameters:
      - description: Filter by channel (email, sms, push, in_app)
        in: query
        name: channel
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Templates list
          schema:
            items:
              $ref: '#/definitions/internal_notifications_ports_http.TemplateResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
      security:
      - BearerAuth: []
      summary: List notification templates
      tags:
      - notifications
    post:
      consumes:
      - application/json
      description: Create a new notification template (admin only)
      parameters:
      - description: Template data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_notifications_ports_http.CreateTemplateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Template created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
      security:
      - BearerAuth: []
      summary: Create notification template
      tags:
      - notifications
  /api/v1/notifications/templates/{id}:
    get:
      description: Get notification template details by ID (admin only)
      parameters:
      - description: Template ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Template details
          schema:
            $ref: '#/definitions/internal_notifications_ports_http.TemplateResponse'
        "400":
          description: Invalid ID
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
      security:
      - BearerAuth: []
      summary: Get template by ID
      tags:
      - notifications
    patch:
      consumes:
      - application/json
      description: Update an existing notification template (admin only)
      parameters:
      - description: Template ID
        in: path
        name: id
        required: true
        type: string
      - description: Template data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_notifications_ports_http.UpdateTemplateRequest'
      responses:
        "204":
          description: Template updated
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/github_com_basilex_skeleton_pkg_apierror.APIError'
      security:
      - BearerAuth: []
      summary: Update notification template
      tags:
      - notifications
  /api/v1/tasks:
    get:
      description: List tasks with optional filters
      parameters:
      - description: Task type filter
        in: query
        name: type
        type: string
      - description: Task status filter
        in: query
        name: status
        type: string
      - description: Task priority filter
        in: query
        name: priority
        type: string
      - description: Limit
        in: query
