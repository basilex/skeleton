version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: skeleton_postgres
    environment:
      POSTGRES_USER: skeleton
      POSTGRES_PASSWORD: skeleton_dev_password
      POSTGRES_DB: skeleton
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skeleton -d skeleton"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skeleton_network

  # Redis Cache & Event Bus
  redis:
    image: redis:7-alpine
    container_name: skeleton_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - skeleton_network

  # API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: skeleton_api
    environment:
      - APP_ENV=dev
      - APP_PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=skeleton
      - DB_PASSWORD=skeleton_dev_password
      - DB_NAME=skeleton
      - DB_SSL_MODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - AUTH_PRIVATE_KEY_PATH=/app/keys/private.pem
      - AUTH_PUBLIC_KEY_PATH=/app/keys/public.pem
      - AUTH_ACCESS_TTL_MINUTES=15
      - AUTH_REFRESH_TTL_DAYS=7
      - SESSION_TTL_MINUTES=1440
      - LOG_LEVEL=debug
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - go_modules:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skeleton_network

  # Swagger UI (API Documentation)
  swagger:
    image: swaggerapi/swagger-ui:v5.10.5
    container_name: skeleton_swagger
    environment:
      - SWAGGER_JSON=/docs/swagger.json
    ports:
      - "8081:8080"
    volumes:
      - ./docs/swagger:/docs
    networks:
      - skeleton_network

  # pgAdmin (Database Management UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: skeleton_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@skeleton.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_SERVER_JSON_FILE: /pgadmin/servers.json
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin/servers.json
    depends_on:
      - postgres
    networks:
      - skeleton_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  go_modules:
    driver: local
  pgadmin_data:
    driver: local

networks:
  skeleton_network:
    driver: bridge