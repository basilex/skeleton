# Development environment with hot reload
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: skeleton-api-dev
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=dev
      - APP_PORT=8080
      - DATABASE_PATH=/app/data/skeleton.db
      - AUTH_PRIVATE_KEY_PATH=/app/keys/private.pem
      - AUTH_PUBLIC_KEY_PATH=/app/keys/public.pem
      - AUTH_ACCESS_TTL_MINUTES=15
      - AUTH_REFRESH_TTL_DAYS=7
      - SESSION_TTL_MINUTES=60
      - SESSION_COOKIE_NAME=session
    volumes:
      - ./data:/app/data
      - ./keys:/app/keys:ro
      - ./configs:/app/configs:ro
      - ./migrations:/app/migrations:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Redis for session store (optional, dev uses in-memory)
  redis:
    image: redis:7-alpine
    container_name: skeleton-redis-dev
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    profiles:
      - redis

volumes:
  redis-data: