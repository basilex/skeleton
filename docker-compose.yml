services:
  postgres:
    image: postgres:16-alpine
    container_name: skeleton-postgres
    environment:
      POSTGRES_DB: skeleton
      POSTGRES_USER: skeleton
      POSTGRES_PASSWORD: skeleton
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skeleton"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: skeleton-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skeleton-backend
    environment:
      # Application
      APP_ENV: prod
      APP_PORT: 8080
      APP_NAME: skeleton
      
      # Database (PostgreSQL)
      DATABASE_URL: postgres://skeleton:skeleton@postgres:5432/skeleton?sslmode=disable
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # JWT Authentication
      JWT_PRIVATE_KEY_PATH: ./keys/private.pem
      JWT_PUBLIC_KEY_PATH: ./keys/public.pem
      JWT_ACCESS_TTL_MINUTES: 15
      JWT_REFRESH_TTL_DAYS: 7
      
      # Session
      SESSION_COOKIE_NAME: session
      SESSION_COOKIE_SECURE: "false"
      SESSION_TTL_MINUTES: 1440
      
      # Logging
      LOG_LEVEL: info
      LOG_FORMAT: json
      
      # Cache
      CACHE_TYPE: memory
      CACHE_DEFAULT_TTL: 300
      
      # Rate Limiting
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_GLOBAL_LIMIT: 1000
      RATE_LIMIT_GLOBAL_WINDOW: 60
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skeleton-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_APP_NAME: Skeleton CRM
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  redis-data: