# Staging environment (for testing before production)
# Similar to production but with relaxed resource limits
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VERSION_MAJOR=${VERSION_MAJOR:-0}
        - VERSION_MINOR=${VERSION_MINOR:-1}
        - VERSION_PATCH=${VERSION_PATCH:-0}
        - VERSION_STAGE=${VERSION_STAGE:-staging}
        - COMMIT=${COMMIT:-unknown}
        - BUILD_TIME=${BUILD_TIME:-unknown}
    image: skeleton-api:${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}-${VERSION_STAGE}
    container_name: skeleton-api-staging
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=staging
      - APP_PORT=8080
      - DATABASE_URL=postgres://skeleton:${DB_PASSWORD}@postgres:5432/skeleton_staging?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - AUTH_PRIVATE_KEY_PATH=/app/keys/private.pem
      - AUTH_PUBLIC_KEY_PATH=/app/keys/public.pem
      - AUTH_ACCESS_TTL_MINUTES=15
      - AUTH_REFRESH_TTL_DAYS=7
      - SESSION_TTL_MINUTES=60
      - SESSION_COOKIE_NAME=session
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - skeleton_network

  postgres:
    image: postgres:16-alpine
    container_name: skeleton-postgres-staging
    restart: unless-stopped
    environment:
      POSTGRES_DB: skeleton_staging
      POSTGRES_USER: skeleton
      POSTGRES_PASSWORD: ${DB_PASSWORD:-skeleton_staging_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skeleton"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skeleton_network

  redis:
    image: redis:7-alpine
    container_name: skeleton-redis-staging
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - skeleton_network

volumes:
  postgres_staging_data:
    driver: local
  redis_staging_data:
    driver: local

networks:
  skeleton_network:
    driver: bridge