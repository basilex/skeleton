# Air live reload configuration
root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/main ./cmd/api"
bin = "./tmp/main"
full_bin = "./tmp/main"
include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml"]
exclude_dir = ["assets", "tmp", "vendor", "node_modules", "bin", "data", "keys"]
exclude_regex = ["_test.go", ".*_test\\.go"]
exclude_unchanged = true
follow_symlink = false
log = "build-errors.log"
poll = false
poll_interval = 0

[log]
time = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true